name: Generate Resume PDF

on:
  push:
    paths:
      - '_data/resume.yml'
      - 'resume.html'
      - 'assets/css/resume.css'
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential for pushing the PDF back to your repo
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
          
      - name: Install Dependencies and System Fonts
        run: |
          bundle install
          # CRITICAL: Install fonts to ensure the PDF text layer is selectable
          sudo apt-get update
          sudo apt-get install -y fonts-liberation fonts-roboto fontconfig ttf-mscorefonts-installer
          # Force update the font cache so Chrome recognizes the new fonts
          sudo fc-cache -f -v
        
      - name: Serve Site and Generate PDF
        run: |
          # Start Jekyll in the background
          bundle exec jekyll serve --detach --port 4000
          
          # Reliability Engineering: Wait until the local server responds
          timeout 30s sh -c 'until curl -s http://127.0.0.1:4000/resume/ > /dev/null; do sleep 2; done'
          
          # Ensure target directory exists
          mkdir -p assets
          
          # Generate PDF with specific flags to maintain a vector text layer
          google-chrome --headless --disable-gpu --no-pdf-header-footer \
          --run-all-compositor-stages-before-draw \
          --print-to-pdf-no-header \
          --print-to-pdf=assets/Chethan_Resume.pdf "http://127.0.0.1:4000/resume/"
          
      - name: Commit and Push Resume PDF
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Stage the PDF
          git add assets/Chethan_Resume.pdf
          
          # Only commit if the PDF binary has actually changed
          if git diff --staged --quiet; then
            echo "No changes detected in the generated PDF. Skipping push."
          else
            git commit -m "chore: auto-generate latest ATS-optimized resume PDF"
            git push
          fi