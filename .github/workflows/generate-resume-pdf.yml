name: Generate Resume PDF

on:
  push:
    paths:
      - '_data/resume.yml'
      - 'resume.html'
      - 'assets/css/resume.css'
  workflow_dispatch:

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
        
      - name: Serve and Generate PDF
        run: |
          # 1. Start Jekyll
          bundle exec jekyll serve --detach --port 4000
          
          # 2. Readiness Probe (Keep this to prevent 'Connection Refused' in the PDF)
          timeout 30s sh -c 'until curl -Is http://127.0.0.1:4000/resume/ | grep "200 OK"; do sleep 2; done'
          
          # 3. Generate PDF Resume
          google-chrome --headless --no-sandbox --disable-dev-shm-usage \
          --print-to-pdf-no-header --no-pdf-header-footer \
          --print-to-pdf=assets/Chethan_Resume.pdf "http://127.0.0.1:4000/resume/"
          
      - name: Commit and Push Resume PDF
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Stage the PDF
          git add assets/Chethan_Resume.pdf
          
          # Only commit if the PDF binary has actually changed
          if git diff --staged --quiet; then
            echo "No changes detected in the generated PDF. Skipping push."
          else
            git commit -m "chore: auto-generate latest ATS-optimized resume PDF"
            git push
          fi