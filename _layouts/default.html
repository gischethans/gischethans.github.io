<!DOCTYPE html>
<html lang="en-US">

<head>
  <meta charset="UTF-8">
  <title>
    {% if page.url == '/resume/' %}
      {{ page.title }}
    {% else %}
      {{ page.title }} | {{ site.title }}
    {% endif %}
  </title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Open Graph / Social sharing -->
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <meta property="og:title" content="{{ page.title | default: site.title | escape }}">
  <meta property="og:description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | truncate: 160 | escape }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:site_name" content="{{ site.title }}">
  {% if page.image %}
  <meta property="og:image" content="{{ page.image | absolute_url }}">
  <meta property="og:image:width" content="1100">
  <meta property="og:image:height" content="440">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="{{ page.image | absolute_url }}">
  {% else %}
  <meta name="twitter:card" content="summary">
  {% endif %}
  <meta name="twitter:title" content="{{ page.title | default: site.title | escape }}">
  <meta name="twitter:description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | truncate: 160 | escape }}">

  <!-- Load Cayman theme stylesheet from the remote theme -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <!-- Local overrides -->
  <link rel="stylesheet" href="{{ '/assets/css/overrides.css' | relative_url }}">
</head>

<body>

  {% include header.html %}

  <main id="content" class="main-content" role="main">
    {{ content }}
    <footer class="site-footer">
      <p>© <span id="current-year">{{ site.time | date: '%Y' }}</span> {{ site.title }} · Generated with <a
          href="https://pages.github.com/">GitHub Pages</a>.</p>
      <script>document.getElementById('current-year').textContent = new Date().getFullYear();</script>
    </footer>
  </main>
  {% include cookie-banner.html %}
</body>

</html>
